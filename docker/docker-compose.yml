# SDET Brain - local development stack.
#
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#
# Services:
#   - qdrant: vector store (port 6333 HTTP, 6334 gRPC), persistent bind mount.
#
# The sdet-brain application service is added in T1-06 once the server exists.
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sdet-brain-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
    # Healthcheck via bash + /dev/tcp:
    # - The qdrant/qdrant image strips wget, curl, nc, and python in
    #   `latest` (verified 2026-04-30). Only `bash` is available among
    #   networking-capable shells.
    # - `CMD-SHELL` would invoke `/bin/sh` (dash) which does NOT support
    #   bash's `/dev/tcp/<host>/<port>` redirect. We invoke `bash`
    #   explicitly so the redirect works.
    # - The probe sends `GET /readyz HTTP/1.0` and checks the status
    #   line for `200 OK`. Faster than parsing JSON.
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "exec 3<>/dev/tcp/127.0.0.1/6333 && printf 'GET /readyz HTTP/1.0\\r\\n\\r\\n' >&3 && head -n 1 <&3 | grep -q '200 OK'",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - sdet-brain-network

  # Optional opt-in service: `docker compose --profile watcher up -d`.
  # Edit WATCH_PATHS + the bind mount below before enabling so the
  # container can see the actual Markdown sources on the host.
  sdet-brain-watcher:
    profiles: ["watcher"]
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: sdet-brain-watcher
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_started
    environment:
      QDRANT_URL: http://qdrant:6333
      WATCH_PATHS: /corpus
      LOG_LEVEL: INFO
    volumes:
      # Replace the default with whichever tree holds your corpus
      # before opting into the profile.
      - ${SDET_BRAIN_CORPUS_HOST:-../../sdet-brand-drafts}:/corpus:ro
    command: ["sdet-brain-watcher"]
    networks:
      - sdet-brain-network

networks:
  sdet-brain-network:
    name: sdet-brain-network
    driver: bridge
