# Run `uv run pre-commit install` once to enable. Mirrors the CI lint gate.
# Keep `ruff` rev in lockstep with the ruff version pinned in pyproject.toml
# (>=0.15.12,<0.16) so local formatting matches CI.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict)
        entry: uv run mypy src
        language: system
        types: [python]
        pass_filenames: false
